- title: "Crystalline phase of the Z-pentomino fluid"
  caption: 'The chiral Z-pentominoes admit six distinct crystal structures up to translations and rotations, two of which appear in this grand-canonical Monte Carlo simulation by <a href="https://openscholarship.wustl.edu/etd/30/" target="_blank">Barnes (2010)</a>. <a href="#paper-8">[8]</a>'
  image: assets/img/post-transition.png

- image: /assets/img/truncated_square_big.tikz.jpg
  title: "Truncated square tiling as a crystal structure"
  caption: 'By fine-tuning the chemical potentials in a mixture of diamonds and octagons on the square lattice, the truncated square tiling emerges as a stable crystal structure at low temperatures. <a href="#paper-8">[8]</a>'

- image: /assets/img/dimeer_post-transition.png
  title: "Nematic phase in an interacting monomer-dimer model"
  caption: 'In one of five lattice models of liquid crystals introduced by Heilmann and Lieb in 1979, the particles are represented by disjoint dimers at chemical potential <mi>&mu;<\mi> with an attractive interaction that lowers the energy by <mi>-a<0</mi> whenever a pair of adjacent dimers are aligned. By suitably tuning <mi>&mu;<\mi> and <mi>a</mi>, the model enters a nematic phase at low temperatures, characterized by the presence of orientational order and the absence of positional order. <a href="#paper-7">[7]</a>'
